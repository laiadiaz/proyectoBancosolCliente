<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil Admin</title>
  <link rel="stylesheet" href="personal.css">
  <script src="auth-common.js" defer></script>
  <script src="api.js" defer></script>
  <script src="personal.js" defer></script>
</head>

<body>
  <header>
    <h1>Has accedido al perfil: admin</h1>
    <p id="nombre-usuario"></p>
  </header>
  <nav>
    <ul>
      <li><a href="admin.html">Inicio</a></li>
      <li><a href="personal.html">Personal</a></li>
      <li><a href="settings.html">Configuración</a></li>
    </ul>
    <button id="btn-cierre-sesion">Cerrar sesión</button>
  </nav>
  <main>
    <h2>Zona de administración de usuarios</h2>
    <table id="tabla-usuarios">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Email</th>
          <th>Perfil</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>
  </main>
  <footer>
    <p>&copy; 2026 Mi Aplicación. Todos los derechos reservados.</p>
  </footer>
  <!-- Ventana modal, por defecto no visible -->
  <div id="ventanaModal" class="modal">
    <div class="contenido-modal">
      <span class="cerrar">&times;</span>
      <h2>Modificar Usuario</h2>
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" value="${usuario.name}">
      <label for="email">Email:</label>
      <input type="email" id="email" value="${usuario.email}">
      <label for="puesto">Perfil:</label>
      <input type="text" id="puesto" value="${usuario.puesto || 'desconocido'}">
      <button id="modalGuardar">Guardar</button>
      <button id="modalCancelar">Cancelar</button>
    </div>
  </div>

</body>

</html>
